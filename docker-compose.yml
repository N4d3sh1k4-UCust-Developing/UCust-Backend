version: '3.8'

services:
  # --- Discovery Service (Eureka) ---
  discovery-service:
    image: ghcr.io/n4d3sh1k4-ucust-developing/netflix-eureka:latest
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m
    deploy:
      resources:
        limits:
          memory: 384M

  # --- Infrastructure: MySQL ---
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: your_root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Infrastructure: RabbitMQ ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rmuser
      RABBITMQ_DEFAULT_PASS: rmpassword
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Infrastructure: MinIO ---
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  # --- API Gateway ---
  api-gateway:
    image: ghcr.io/n4d3sh1k4-ucust-developing/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8180:8180"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx256m -Xms128m
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-user:zvBGTYdMUJV7mpRs35YA@discovery-service:8761/eureka/
    depends_on:
      - discovery-service
    deploy:
      resources:
        limits:
          memory: 384M

  # --- Security Service ---
  security-service:
    image: ghcr.io/n4d3sh1k4-ucust-developing/security-service:latest
    container_name: security-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx384m -Xms256m
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/security_service_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-user:zvBGTYdMUJV7mpRs35YA@discovery-service:8761/eureka/
    depends_on:
      - mysql-db
      - rabbitmq
      - discovery-service
    deploy:
      resources:
        limits:
          memory: 768M

  # --- User Service ---
  user-service:
    image: ghcr.io/n4d3sh1k4-ucust-developing/user-service:latest
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/user_service_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - MINIO_ENDPOINT=http://minio:9000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-user:zvBGTYdMUJV7mpRs35YA@discovery-service:8761/eureka/
    depends_on:
      - mysql-db
      - rabbitmq
      - discovery-service
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Business Service ---
  business-service:
    image: ghcr.io/n4d3sh1k4-ucust-developing/business-service:latest
    container_name: business-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/business_service_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - MINIO_ENDPOINT=http://minio:9000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-user:zvBGTYdMUJV7mpRs35YA@discovery-service:8761/eureka/
    depends_on:
      - mysql-db
      - rabbitmq
      - discovery-service
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Notification Service ---
  notification-service:
    image: ghcr.io/n4d3sh1k4-ucust-developing/notification-service:latest
    container_name: notification-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-user:zvBGTYdMUJV7mpRs35YA@discovery-service:8761/eureka/
    depends_on:
      - rabbitmq
      - discovery-service
    deploy:
      resources:
        limits:
          memory: 412M

volumes:
  mysql_data:
  minio_data: